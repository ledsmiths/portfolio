<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPaw — Account Setting</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="ca" viewBox="0 0 72 72"><circle cx="36" cy="36" r="36" fill="#e8d5c4"/><ellipse cx="36" cy="42" rx="18" ry="16" fill="#d4b89a"/><circle cx="28" cy="32" r="7" fill="#fff"/><circle cx="44" cy="32" r="7" fill="#fff"/><circle cx="29" cy="33" r="4" fill="#4a3728"/><circle cx="45" cy="33" r="4" fill="#4a3728"/><circle cx="30" cy="32" r="1.5" fill="#fff"/><circle cx="46" cy="32" r="1.5" fill="#fff"/><ellipse cx="36" cy="40" rx="4" ry="3" fill="#c9967a"/><path d="M32 44 Q36 47 40 44" stroke="#8b5e3c" stroke-width="1.2" fill="none" stroke-linecap="round"/><line x1="20" y1="38" x2="12" y2="36" stroke="#8b5e3c" stroke-width="1"/><line x1="20" y1="40" x2="11" y2="40" stroke="#8b5e3c" stroke-width="1"/><line x1="52" y1="38" x2="60" y2="36" stroke="#8b5e3c" stroke-width="1"/><line x1="52" y1="40" x2="61" y2="40" stroke="#8b5e3c" stroke-width="1"/><polygon points="18,14 24,26 12,26" fill="#e8d5c4"/><polygon points="54,14 60,26 48,26" fill="#e8d5c4"/><polygon points="19,16 23,24 15,24" fill="#f0a0a0"/><polygon points="53,16 57,24 49,24" fill="#f0a0a0"/></symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </symbol>
    <symbol id="icon-camera-sm" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen" style="background:#f2f4f8;">

    <!-- Status bar -->
    <div class="status-bar sb-light" style="background:#f2f4f8;">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="ac-nav">
      <div class="ac-back" onclick="window.location.href='settings.html'">
        <svg width="24" height="24"><use href="#icon-chevron-left" width="24" height="24" stroke="#2A282F"/></svg>
      </div>
      <span class="ac-title">Account Setting</span>
      <div style="width:32px;"></div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-content" style="background:#f2f4f8;">
      <div style="padding: 24px 20px; display: flex; flex-direction: column; gap: 24px;">

        <!-- Avatar -->
        <div class="ac-avatar-section">
          <div class="ac-avatar-wrap" onclick="document.getElementById('avatar-input').click()">
            <svg width="80" height="80" style="border-radius:50%;" id="ac-avatar-svg">
              <use href="#ca" width="80" height="80"/>
            </svg>
            <div class="ac-avatar-badge">
              <svg width="14" height="14"><use href="#icon-camera-sm" width="14" height="14" stroke="#fff"/></svg>
            </div>
          </div>
          <input id="avatar-input" type="file" accept="image/*" style="display:none;" onchange="previewAvatar(event)"/>
          <span class="ac-avatar-hint">Tap to change avatar</span>
        </div>

        <!-- Info card -->
        <div class="ac-form-card">

          <!-- Username -->
          <div class="ac-info-row" onclick="window.location.href='set-username.html'" style="cursor:pointer;">
            <div class="ac-info-left">
              <span class="ac-info-label">Username</span>
              <span class="ac-info-value" id="display-username">Emily</span>
            </div>
            <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
          </div>

          <div class="ac-field-divider"></div>

          <!-- Mobile -->
          <div class="ac-info-row" onclick="window.location.href='verify-identity.html?target=mobile'" style="cursor:pointer;">
            <div class="ac-info-left">
              <span class="ac-info-label">Mobile</span>
              <span class="ac-info-value" id="display-mobile" style="color:#9aa0ae;">Not set</span>
            </div>
            <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
          </div>

          <div class="ac-field-divider"></div>

          <!-- Email → new full-page flow -->
          <div class="ac-info-row" onclick="window.location.href='verify-identity.html'" style="cursor:pointer;">
            <div class="ac-info-left">
              <span class="ac-info-label">Email</span>
              <span class="ac-info-value" id="display-email">emily@example.com</span>
            </div>
            <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
          </div>

          <div class="ac-field-divider"></div>

          <!-- Password -->
          <div class="ac-info-row" onclick="window.location.href='set-password.html'" style="cursor:pointer;">
            <div class="ac-info-left">
              <span class="ac-info-label">Password</span>
              <span class="ac-info-value" id="display-password" style="color:#6e76fe;">Set Password</span>
            </div>
            <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════
     BOTTOM SHEET — shared overlay
═══════════════════════════════════════════════════ -->
<div class="ac-overlay" id="ac-overlay" onclick="closeSheet()"></div>

<!-- ── Sheet: Edit Username ── -->
<div class="ac-sheet" id="sheet-username">
  <div class="ac-sheet-handle"></div>
  <div class="ac-sheet-title">Edit Username</div>
  <input class="ac-sheet-input" id="input-username" type="text" placeholder="Enter username" autocomplete="off"/>
  <button class="ac-sheet-done" onclick="confirmUsername()">Done</button>
</div>

<!-- ── Sheet: Verify (Email / Mobile) — 2-step ── -->
<div class="ac-sheet" id="sheet-verify">
  <div class="ac-sheet-handle"></div>
  <div class="ac-sheet-title" id="verify-title">Change Email</div>

  <!-- Step 1: new value input -->
  <div id="verify-step1">
    <div id="verify-hint" class="ac-verify-hint"></div>
    <input class="ac-sheet-input" id="verify-input" type="text" placeholder="" autocomplete="off"/>
    <button class="ac-sheet-done" id="send-code-btn" onclick="sendCode()">Send Code</button>
  </div>

  <!-- Step 2: code input -->
  <div id="verify-step2" style="display:none;">
    <div class="ac-verify-hint" id="verify-sent-hint"></div>
    <div class="ac-code-row">
      <input class="ac-sheet-input ac-code-input" id="verify-code" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit code" autocomplete="one-time-code"/>
      <button class="ac-resend-btn" id="resend-btn" onclick="resendCode()" disabled>60s</button>
    </div>
    <button class="ac-sheet-done" onclick="confirmVerify()">Verify</button>
  </div>
</div>

<!-- ── Sheet: Set Password ── -->
<div class="ac-sheet" id="sheet-password">
  <div class="ac-sheet-handle"></div>
  <div class="ac-sheet-title">Set Password</div>
  <div style="display:flex;flex-direction:column;gap:12px;">
    <div class="ac-sheet-pw-field">
      <input class="ac-sheet-input" id="pw-new" type="password" placeholder="New password" autocomplete="new-password"/>
      <button class="ac-eye-btn" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);" onclick="toggleEye('pw-new','eye-new')">
        <svg width="18" height="18" id="eye-new"><use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/></svg>
      </button>
    </div>
    <div class="ac-sheet-pw-field">
      <input class="ac-sheet-input" id="pw-confirm" type="password" placeholder="Confirm password" autocomplete="new-password"/>
      <button class="ac-eye-btn" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);" onclick="toggleEye('pw-confirm','eye-confirm')">
        <svg width="18" height="18" id="eye-confirm"><use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/></svg>
      </button>
    </div>
    <div id="pw-error" style="font-size:12px;color:#ff4d4d;min-height:16px;padding:0 2px;"></div>
  </div>
  <button class="ac-sheet-done" onclick="confirmPassword()">Done</button>
</div>

<script>
/* ── data — seed from sessionStorage if available ── */
const userData = {
  username: sessionStorage.getItem('userUsername') || 'Emily',
  email:    sessionStorage.getItem('userEmail')    || 'emily@example.com',
  mobile:   sessionStorage.getItem('userMobile')   || '',
  password: ''
};

/* ── sync display on load ── */
(function syncDisplay() {
  document.getElementById('display-username').textContent = userData.username;
  if (userData.email) {
    document.getElementById('display-email').textContent = userData.email;
    document.getElementById('display-email').style.color = '';
  }
  if (userData.mobile) {
    document.getElementById('display-mobile').textContent = userData.mobile;
    document.getElementById('display-mobile').style.color = '#2A282F';
  }
  const pw = sessionStorage.getItem('userPassword') || '';
  const pwEl = document.getElementById('display-password');
  if (pw) {
    pwEl.textContent = 'Password set  ✓';
    pwEl.style.color = '#52c471';
  } else {
    pwEl.textContent = 'Set Password';
    pwEl.style.color = '#6e76fe';
  }
})();
let currentSheet = null;
let verifyField  = null;   // 'email' | 'mobile'
let countdownTimer = null;
const MOCK_CODE = '123456'; // demo verification code

/* ─── overlay / sheet helpers ─── */
function openSheet(id) {
  closeSheet(true);
  currentSheet = id;
  document.getElementById('ac-overlay').classList.add('active');
  document.getElementById(id).classList.add('active');
}

function closeSheet(silent) {
  document.getElementById('ac-overlay').classList.remove('active');
  document.querySelectorAll('.ac-sheet').forEach(s => s.classList.remove('active'));
  if (!silent) currentSheet = null;
  clearCountdown();
}

document.getElementById('ac-overlay').addEventListener('click', () => closeSheet());

/* ─── Username ─── */
function openUsername() {
  document.getElementById('input-username').value = userData.username;
  openSheet('sheet-username');
  setTimeout(() => document.getElementById('input-username').focus(), 300);
}
function confirmUsername() {
  const val = document.getElementById('input-username').value.trim();
  if (!val) return;
  userData.username = val;
  document.getElementById('display-username').textContent = val;
  closeSheet();
}

/* ─── Email / Mobile (verification flow) ─── */
function openVerify(field) {
  verifyField = field;
  const isEmail = field === 'email';

  document.getElementById('verify-title').textContent = isEmail ? 'Change Email' : 'Set Mobile';
  document.getElementById('verify-input').type        = isEmail ? 'email' : 'tel';
  document.getElementById('verify-input').placeholder = isEmail ? 'New email address' : 'Mobile number';
  document.getElementById('verify-input').value       = '';

  const hint = isEmail
    ? `A verification code will be sent to your current email <strong>${userData.email}</strong>`
    : 'A verification code will be sent to your mobile number';
  document.getElementById('verify-hint').innerHTML = hint;

  // reset to step 1
  showVerifyStep(1);
  document.getElementById('pw-error') && (document.getElementById('pw-error').textContent = '');

  openSheet('sheet-verify');
  setTimeout(() => document.getElementById('verify-input').focus(), 300);
}

function showVerifyStep(n) {
  document.getElementById('verify-step1').style.display = n === 1 ? 'block' : 'none';
  document.getElementById('verify-step2').style.display = n === 2 ? 'block' : 'none';
}

function sendCode() {
  const val = document.getElementById('verify-input').value.trim();
  if (!val) return;

  // show step 2
  const isEmail = verifyField === 'email';
  const dest = isEmail ? val : val;
  document.getElementById('verify-sent-hint').innerHTML =
    `Code sent to <strong>${dest}</strong>. Enter it below. (Demo: <strong>${MOCK_CODE}</strong>)`;
  document.getElementById('verify-code').value = '';
  showVerifyStep(2);
  setTimeout(() => document.getElementById('verify-code').focus(), 200);
  startCountdown();
}

function confirmVerify() {
  const code = document.getElementById('verify-code').value.trim();
  if (code !== MOCK_CODE) {
    document.getElementById('verify-code').style.outline = '2px solid #ff4d4d';
    setTimeout(() => document.getElementById('verify-code').style.outline = '', 1200);
    return;
  }
  const val = document.getElementById('verify-input').value.trim();
  userData[verifyField] = val;

  if (verifyField === 'email') {
    document.getElementById('display-email').textContent = val;
    document.getElementById('display-email').style.color = '';
  } else {
    document.getElementById('display-mobile').textContent = val;
    document.getElementById('display-mobile').style.color = '#2A282F';
  }
  closeSheet();
}

/* ─── Password ─── */
function openPassword() {
  document.getElementById('pw-new').value     = '';
  document.getElementById('pw-confirm').value = '';
  document.getElementById('pw-error').textContent = '';
  ['pw-new','pw-confirm'].forEach(id => { document.getElementById(id).type = 'password'; });
  document.getElementById('eye-new').innerHTML     = '<use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/>';
  document.getElementById('eye-confirm').innerHTML = '<use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/>';
  openSheet('sheet-password');
  setTimeout(() => document.getElementById('pw-new').focus(), 300);
}
function confirmPassword() {
  const nv = document.getElementById('pw-new').value.trim();
  const cv = document.getElementById('pw-confirm').value.trim();
  if (!nv) { document.getElementById('pw-error').textContent = 'Password cannot be empty.'; return; }
  if (nv !== cv) { document.getElementById('pw-error').textContent = 'Passwords do not match.'; return; }
  userData.password = nv;
  document.getElementById('display-password').textContent = 'Password set  ✓';
  document.getElementById('display-password').style.color = '#52c471';
  closeSheet();
}

/* ─── eye toggle ─── */
function toggleEye(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<use href="#icon-eye" width="18" height="18" stroke="#6e76fe"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/>';
  }
}

/* ─── countdown ─── */
function startCountdown() {
  clearCountdown();
  let sec = 60;
  const btn = document.getElementById('resend-btn');
  btn.disabled = true;
  btn.textContent = sec + 's';
  countdownTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearCountdown();
      btn.disabled = false;
      btn.textContent = 'Resend';
    } else {
      btn.textContent = sec + 's';
    }
  }, 1000);
}
function clearCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}
function resendCode() {
  document.getElementById('verify-sent-hint').innerHTML =
    document.getElementById('verify-sent-hint').innerHTML.replace('Code sent','Code resent');
  startCountdown();
}

/* ─── avatar ─── */
function previewAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wrap = document.querySelector('.ac-avatar-wrap');
    let img = wrap.querySelector('img.ac-avatar-img');
    if (!img) {
      img = document.createElement('img');
      img.className = 'ac-avatar-img';
      img.style.cssText = 'width:80px;height:80px;border-radius:50%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;';
      wrap.appendChild(img);
    }
    img.src = e.target.result;
    document.getElementById('ac-avatar-svg').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

/* ─── keyboard ─── */
document.addEventListener('keydown', e => {
  if (!currentSheet) return;
  if (e.key === 'Escape') closeSheet();
});
</script>

</body>
</html>
