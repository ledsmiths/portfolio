<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VitaPaw — Set Password</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </symbol>
    <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </symbol>
    <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.83a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </symbol>
    <symbol id="icon-check-circle" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen" style="background:#f2f4f8;">

    <!-- Status bar -->
    <div class="status-bar sb-light" style="background:#f2f4f8;">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
      </div>
    </div>

    <!-- Nav -->
    <div class="ac-nav">
      <div class="ac-back" id="nav-back" onclick="navBack()">
        <svg width="24" height="24"><use href="#icon-chevron-left" width="24" height="24" stroke="#2A282F"/></svg>
      </div>
      <span class="ac-title" id="nav-title">Set Password</span>
      <div style="width:32px;"></div>
    </div>

    <div class="scroll-content" style="background:#f2f4f8;overflow-x:hidden;">
      <div style="padding:28px 20px;display:flex;flex-direction:column;gap:24px;box-sizing:border-box;width:100%;">

        <!-- ══ VIEW A: Enter current password ══ -->
        <div id="view-old" style="display:none;flex-direction:column;gap:24px;">
          <div style="font-size:15px;color:#5F6C85;line-height:1.6;">
            Enter your current password to continue.
          </div>

          <div class="ac-form-card">
            <div class="ac-field">
              <label class="ac-field-label">Current Password</label>
              <div class="ac-password-wrap">
                <input class="ac-field-input" id="old-pw-input" type="password"
                       placeholder="Enter current password" autocomplete="current-password"
                       oninput="clearOldPwError()" style="flex:1;border:none;outline:none;padding:0;"/>
                <button class="ac-eye-btn" onclick="toggleEye('old-pw-input','eye-old')">
                  <svg width="18" height="18" id="eye-old"><use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div id="old-pw-error" style="font-size:13px;color:#ff4d4d;margin-top:-12px;min-height:18px;"></div>

          <!-- Forgot password link -->
          <div style="text-align:right;margin-top:-8px;">
            <button class="sp-forgot-btn" onclick="switchToVerify()">Forgot password?</button>
          </div>

          <button class="vi-next-btn" onclick="submitOldPw()">Next</button>
        </div>

        <!-- ══ VIEW B: Verification code ══ -->
        <div id="view-verify" style="display:none;flex-direction:column;gap:24px;">
          <div style="font-size:15px;color:#5F6C85;line-height:1.6;" id="verify-desc">
            We'll send a verification code to confirm your identity.
          </div>

          <div>
            <div style="font-size:12px;font-weight:600;color:#9aa0ae;margin-bottom:10px;letter-spacing:.4px;text-transform:uppercase;">Send code via</div>
            <div style="display:flex;gap:8px;">
              <button class="vi-pill vi-pill-on" id="sp-opt-email" onclick="spSelectMethod('email')">
                <span class="vi-pill-radio vi-pill-radio-on" id="sp-radio-email"></span>
                <svg width="13" height="13" style="flex-shrink:0;"><use href="#icon-mail" width="13" height="13" stroke="currentColor"/></svg>
                <span class="vi-pill-label">Email</span>
                <span class="vi-pill-badge" id="sp-email-badge" style="color:#6e76fe;opacity:.7;"></span>
              </button>
              <button class="vi-pill vi-pill-off" id="sp-opt-mobile" onclick="spSelectMethod('mobile')" disabled>
                <span class="vi-pill-radio" id="sp-radio-mobile"></span>
                <svg width="13" height="13" style="flex-shrink:0;"><use href="#icon-phone" width="13" height="13" stroke="currentColor"/></svg>
                <span class="vi-pill-label">Mobile</span>
                <span class="vi-pill-badge" id="sp-mobile-badge">Not set</span>
              </button>
            </div>
          </div>

          <div style="width:100%;box-sizing:border-box;">
            <div style="font-size:12px;font-weight:600;color:#9aa0ae;margin-bottom:10px;letter-spacing:.4px;text-transform:uppercase;">Verification Code</div>
            <div style="display:flex;gap:8px;width:100%;box-sizing:border-box;">
              <input class="vi-code-input" id="sp-code-input" type="text" inputmode="numeric"
                     maxlength="6" placeholder="Enter 6-digit code" autocomplete="one-time-code"
                     oninput="spCheckCode()" style="flex:1;min-width:0;"/>
              <button class="vi-send-btn" id="sp-send-btn" onclick="spSendCode()">Send Code</button>
            </div>
            <div class="vi-code-hint" id="sp-code-hint"></div>
          </div>

          <button class="vi-next-btn" id="sp-verify-next" onclick="showNewPw()" disabled>Next</button>
        </div>

        <!-- ══ VIEW C: Set new password ══ -->
        <div id="view-new" style="display:none;flex-direction:column;gap:24px;">
          <div style="font-size:15px;color:#5F6C85;line-height:1.6;">
            Choose a strong password for your account.
          </div>

          <div class="ac-form-card">
            <div class="ac-field">
              <label class="ac-field-label">New Password</label>
              <div class="ac-password-wrap">
                <input class="ac-field-input" id="new-pw-input" type="password"
                       placeholder="At least 8 characters" autocomplete="new-password"
                       oninput="checkNewPw()" style="flex:1;border:none;outline:none;padding:0;"/>
                <button class="ac-eye-btn" onclick="toggleEye('new-pw-input','eye-new')">
                  <svg width="18" height="18" id="eye-new"><use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/></svg>
                </button>
              </div>
            </div>
            <div class="ac-field-divider"></div>
            <div class="ac-field">
              <label class="ac-field-label">Confirm Password</label>
              <div class="ac-password-wrap">
                <input class="ac-field-input" id="confirm-pw-input" type="password"
                       placeholder="Re-enter password" autocomplete="new-password"
                       oninput="checkNewPw()" style="flex:1;border:none;outline:none;padding:0;"/>
                <button class="ac-eye-btn" onclick="toggleEye('confirm-pw-input','eye-confirm')">
                  <svg width="18" height="18" id="eye-confirm"><use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div id="new-pw-error" style="font-size:13px;color:#ff4d4d;margin-top:-12px;min-height:18px;"></div>

          <button class="vi-next-btn" id="new-pw-done" onclick="savePassword()" disabled>Done</button>
        </div>

        <!-- ══ VIEW D: Success ══ -->
        <div id="view-success" style="display:none;flex-direction:column;align-items:center;gap:20px;padding-top:40px;">
          <div style="width:72px;height:72px;border-radius:50%;background:#eaf9f0;display:flex;align-items:center;justify-content:center;">
            <svg width="36" height="36"><use href="#icon-check-circle" width="36" height="36" stroke="#52c471"/></svg>
          </div>
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:600;color:#2A282F;margin-bottom:8px;">Password Updated!</div>
            <div style="font-size:14px;color:#5F6C85;line-height:1.6;">Your password has been set successfully.</div>
          </div>
          <button class="vi-next-btn" style="margin-top:12px;" onclick="window.location.href='account-setting.html'">Back to Account</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  const storedPassword = sessionStorage.getItem('userPassword') || '';
  const storedEmail    = sessionStorage.getItem('userEmail')    || 'emily@example.com';
  const storedMobile   = sessionStorage.getItem('userMobile')   || '';
  const MOCK_CODE      = '123456';

  let spSelectedMethod = 'email';
  let spCountdown      = null;
  let currentView      = '';

  /* ── init: decide first view ── */
  if (storedPassword) {
    showView('view-old');
  } else {
    showView('view-verify');
  }

  /* populate pill badges */
  document.getElementById('sp-email-badge').textContent = storedEmail;
  if (storedMobile) {
    const mBtn = document.getElementById('sp-opt-mobile');
    mBtn.disabled = false;
    mBtn.classList.remove('vi-pill-off');
    document.getElementById('sp-mobile-badge').textContent = storedMobile;
  }

  /* ── view switching ── */
  function showView(id) {
    ['view-old','view-verify','view-new','view-success'].forEach(v => {
      const el = document.getElementById(v);
      el.style.display = 'none';
    });
    currentView = id;
    const el = document.getElementById(id);
    el.style.display = 'flex';

    const titles = {
      'view-old':     'Set Password',
      'view-verify':  'Verify Identity',
      'view-new':     'New Password',
      'view-success': 'Set Password',
    };
    document.getElementById('nav-title').textContent = titles[id] || 'Set Password';
  }

  /* ── nav back ── */
  function navBack() {
    if (currentView === 'view-verify' && storedPassword) {
      showView('view-old');
    } else if (currentView === 'view-new') {
      showView(storedPassword ? 'view-old' : 'view-verify');
    } else {
      history.back();
    }
  }

  /* ── VIEW A: old password ── */
  function submitOldPw() {
    const val = document.getElementById('old-pw-input').value;
    if (val === storedPassword) {
      showView('view-new');
    } else {
      document.getElementById('old-pw-error').textContent = 'Incorrect password.';
    }
  }
  function clearOldPwError() {
    document.getElementById('old-pw-error').textContent = '';
  }
  function switchToVerify() {
    document.getElementById('verify-desc').textContent =
      'Enter the code to reset your password.';
    showView('view-verify');
  }

  /* ── VIEW B: verification ── */
  function spSelectMethod(m) {
    if (m === 'mobile' && !storedMobile) return;
    spSelectedMethod = m;

    const eBtn = document.getElementById('sp-opt-email');
    const mBtn = document.getElementById('sp-opt-mobile');
    eBtn.classList.toggle('vi-pill-on', m === 'email');
    eBtn.querySelector('.vi-pill-radio').classList.toggle('vi-pill-radio-on', m === 'email');
    mBtn.classList.toggle('vi-pill-on', m === 'mobile');
    mBtn.querySelector('.vi-pill-radio').classList.toggle('vi-pill-radio-on', m === 'mobile');
  }

  function spSendCode() {
    const dest = spSelectedMethod === 'email' ? storedEmail : storedMobile;
    const hint = document.getElementById('sp-code-hint');
    hint.style.color = '#5F6C85';
    hint.textContent = `Code sent to ${dest}  (demo: ${MOCK_CODE})`;
    spStartCountdown();

    setTimeout(() => {
      const inp = document.getElementById('sp-code-input');
      inp.value = '';
      let i = 0;
      const fill = setInterval(() => {
        inp.value += MOCK_CODE[i++];
        if (i >= MOCK_CODE.length) { clearInterval(fill); spCheckCode(); }
      }, 80);
    }, 2000);
  }

  function spStartCountdown() {
    clearInterval(spCountdown);
    let sec = 60;
    const btn = document.getElementById('sp-send-btn');
    btn.disabled = true;
    btn.classList.add('vi-send-btn-counting');
    btn.textContent = `${sec}s`;
    spCountdown = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(spCountdown);
        btn.disabled = false;
        btn.classList.remove('vi-send-btn-counting');
        btn.textContent = 'Resend';
      } else {
        btn.textContent = `${sec}s`;
      }
    }, 1000);
  }

  function spCheckCode() {
    const val  = document.getElementById('sp-code-input').value.trim();
    const hint = document.getElementById('sp-code-hint');
    const next = document.getElementById('sp-verify-next');
    if (val === MOCK_CODE) {
      next.disabled = false;
      hint.style.color = '#52c471';
      hint.textContent = '✓ Code verified';
    } else if (val.length === 6) {
      next.disabled = true;
      hint.style.color = '#ff4d4d';
      hint.textContent = 'Incorrect code, please try again.';
    } else {
      next.disabled = true;
    }
  }

  function showNewPw() { showView('view-new'); }

  /* ── VIEW C: new password ── */
  function checkNewPw() {
    const nv  = document.getElementById('new-pw-input').value;
    const cv  = document.getElementById('confirm-pw-input').value;
    const err = document.getElementById('new-pw-error');
    const btn = document.getElementById('new-pw-done');
    if (nv.length > 0 && nv.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      btn.disabled = true;
    } else if (cv.length > 0 && nv !== cv) {
      err.textContent = 'Passwords do not match.';
      btn.disabled = true;
    } else {
      err.textContent = '';
      btn.disabled = !(nv.length >= 8 && nv === cv);
    }
  }

  function savePassword() {
    const nv = document.getElementById('new-pw-input').value;
    sessionStorage.setItem('userPassword', nv);
    showView('view-success');
  }

  /* ── eye toggle ── */
  function toggleEye(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<use href="#icon-eye" width="18" height="18" stroke="#6e76fe"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<use href="#icon-eye-off" width="18" height="18" stroke="#9aa0ae"/>';
    }
  }
</script>

</body>
</html>
