<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPaw — Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="ca" viewBox="0 0 72 72"><circle cx="36" cy="36" r="36" fill="#e8d5c4"/><ellipse cx="36" cy="42" rx="18" ry="16" fill="#d4b89a"/><circle cx="28" cy="32" r="7" fill="#fff"/><circle cx="44" cy="32" r="7" fill="#fff"/><circle cx="29" cy="33" r="4" fill="#4a3728"/><circle cx="45" cy="33" r="4" fill="#4a3728"/><circle cx="30" cy="32" r="1.5" fill="#fff"/><circle cx="46" cy="32" r="1.5" fill="#fff"/><ellipse cx="36" cy="40" rx="4" ry="3" fill="#c9967a"/><path d="M32 44 Q36 47 40 44" stroke="#8b5e3c" stroke-width="1.2" fill="none" stroke-linecap="round"/><line x1="20" y1="38" x2="12" y2="36" stroke="#8b5e3c" stroke-width="1"/><line x1="20" y1="40" x2="11" y2="40" stroke="#8b5e3c" stroke-width="1"/><line x1="52" y1="38" x2="60" y2="36" stroke="#8b5e3c" stroke-width="1"/><line x1="52" y1="40" x2="61" y2="40" stroke="#8b5e3c" stroke-width="1"/><polygon points="18,14 24,26 12,26" fill="#e8d5c4"/><polygon points="54,14 60,26 48,26" fill="#e8d5c4"/><polygon points="19,16 23,24 15,24" fill="#f0a0a0"/><polygon points="53,16 57,24 49,24" fill="#f0a0a0"/></symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </symbol>
    <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </symbol>
    <symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </symbol>
    <symbol id="icon-clipboard" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="16" x2="13" y2="16"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen" style="background:#f2f4f8;">

    <!-- Status bar -->
    <div class="status-bar sb-light" style="background:#f2f4f8;">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-content" style="background:#f2f4f8;">
      <div style="padding: 16px 20px; display: flex; flex-direction: column; gap: 16px;">

        <!-- Profile section -->
        <div class="st-profile">
          <div class="st-avatar-wrap">
            <svg width="52" height="52" style="border-radius:50%;flex-shrink:0;">
              <use href="#ca" width="52" height="52"/>
            </svg>
          </div>
          <span class="st-greeting">Hello, Emily</span>
        </div>

        <!-- Menu items (no card) -->
        <div>

          <div class="st-menu-item" onclick="window.location.href='account-setting.html'" style="cursor:pointer;">
            <div class="st-menu-icon">
              <svg width="20" height="20"><use href="#icon-user" width="20" height="20" stroke="#5F6C85"/></svg>
            </div>
            <span class="st-menu-label">Account editing</span>
            <div class="st-menu-chevron">
              <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
            </div>
          </div>

          <div class="st-divider"></div>

          <div class="st-menu-item" onclick="window.location.href='notifications-setting.html'" style="cursor:pointer;">
            <div class="st-menu-icon">
              <svg width="20" height="20"><use href="#icon-bell" width="20" height="20" stroke="#5F6C85"/></svg>
            </div>
            <span class="st-menu-label">Notifications setting</span>
            <div class="st-menu-chevron">
              <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
            </div>
          </div>

          <div class="st-divider"></div>

          <div class="st-menu-item" onclick="window.location.href='camera-management.html'" style="cursor:pointer;">
            <div class="st-menu-icon">
              <svg width="20" height="20"><use href="#icon-camera" width="20" height="20" stroke="#5F6C85"/></svg>
            </div>
            <span class="st-menu-label">Camera Management</span>
            <div class="st-menu-chevron">
              <svg width="16" height="16"><use href="#icon-chevron-right" width="16" height="16" stroke="#c8cdd8"/></svg>
            </div>
          </div>

        </div>

        <!-- Logout & switch account -->
        <div class="st-bottom-actions">
          <button class="st-logout-btn" onclick="">Logout</button>
          <span class="st-switch-account">switch account</span>
        </div>

      </div>
    </div>

    <!-- Bottom tab bar (Settings active) -->
    <div class="tab-bar">
      <div class="tab-item" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <svg width="24" height="24"><use href="#icon-bell" width="24" height="24" stroke="#bbb"/></svg>
        <span class="tab-lbl muted">Alarm</span>
      </div>
      <div class="tab-item" onclick="window.location.href='pets.html'" style="cursor:pointer;">
        <svg width="24" height="24"><use href="#icon-clipboard" width="24" height="24" stroke="#bbb"/></svg>
        <span class="tab-lbl muted">My Pets</span>
      </div>
      <div class="tab-item">
        <svg width="24" height="24"><use href="#icon-settings" width="24" height="24" stroke="#6e76fe"/></svg>
        <span class="tab-lbl">Settings</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
