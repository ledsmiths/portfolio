<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPaw — Scan Pet</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Scan page ─────────────────────────────────────────────────── */
    .scan-body {
      display: flex; flex-direction: column; height: 100%; background: #f7fafe;
    }

    .scan-nav {
      display: flex; align-items: center; justify-content: center;
      padding: 10px 16px 10px; position: relative;
      background: #f7fafe; flex-shrink: 0;
    }
    .scan-back {
      position: absolute; left: 16px; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .scan-title { font-size: 16px; font-weight: 600; color: #2A282F; }

    /* Camera area */
    .scan-camera-wrap {
      flex: 1; background: #868fa0;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .scan-camera-wrap::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.38) 100%);
      z-index: 1;
    }

    /* Viewfinder */
    .scan-viewfinder {
      width: 288px; height: 336px; position: relative; overflow: hidden;
      border-radius: 3px; z-index: 2;
    }

    /* Simulated photo bg */
    .scan-photo-bg {
      width: 100%; height: 100%;
      background: linear-gradient(170deg, #d8d0c0 0%, #c0b090 30%, #a89070 60%, #c8bca8 100%);
      display: flex; align-items: flex-end; justify-content: center;
      overflow: hidden; position: relative;
    }
    .scan-photo-bg::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 40% 30%, rgba(255,255,255,0.14) 0%, transparent 70%);
    }
    .scan-cat-svg { width: 240px; height: 240px; margin-bottom: -4px; position: relative; z-index: 1; }

    /* L-shaped corner brackets */
    .sc-corner { position: absolute; width: 28px; height: 28px; z-index: 10; }
    .sc-corner::before,
    .sc-corner::after { content: ''; position: absolute; background: #fff; border-radius: 2px; }
    .sc-corner.tl { top: 0; left: 0; }
    .sc-corner.tl::before { width: 3px; height: 28px; top: 0; left: 0; }
    .sc-corner.tl::after  { width: 28px; height: 3px; top: 0; left: 0; }
    .sc-corner.tr { top: 0; right: 0; }
    .sc-corner.tr::before { width: 3px; height: 28px; top: 0; right: 0; }
    .sc-corner.tr::after  { width: 28px; height: 3px; top: 0; right: 0; }
    .sc-corner.bl { bottom: 0; left: 0; }
    .sc-corner.bl::before { width: 3px; height: 28px; bottom: 0; left: 0; }
    .sc-corner.bl::after  { width: 28px; height: 3px; bottom: 0; left: 0; }
    .sc-corner.br { bottom: 0; right: 0; }
    .sc-corner.br::before { width: 3px; height: 28px; bottom: 0; right: 0; }
    .sc-corner.br::after  { width: 28px; height: 3px; bottom: 0; right: 0; }

    /* Animated scan line */
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(110,200,255,0.9) 50%, transparent 100%);
      z-index: 8; top: 0; opacity: 0;
    }
    .scan-line.running {
      animation: scanMove 2s cubic-bezier(0.4, 0, 0.6, 1) forwards;
    }
    @keyframes scanMove {
      0%   { top: 0;    opacity: 1; }
      80%  { top: 100%; opacity: 0.7; }
      100% { top: 100%; opacity: 0; }
    }

    /* Green success tint */
    .scan-tint {
      position: absolute; inset: 0; background: rgba(82,196,113,0.1);
      opacity: 0; transition: opacity 0.6s ease; z-index: 6; pointer-events: none;
    }
    .scan-tint.show { opacity: 1; }

    /* Bottom info panel */
    .scan-bottom {
      background: #f7fafe; padding: 22px 20px 16px; flex-shrink: 0;
    }
    .scan-status {
      font-size: 13px; color: #5F6C85; text-align: center; margin-bottom: 6px; min-height: 20px;
    }
    .scan-prompt {
      font-size: 18px; font-weight: 700; color: #2A282F; text-align: center;
      margin-bottom: 22px; min-height: 54px; line-height: 1.4;
    }

    /* Button — base shape matches Mark as seen */
    .scan-btn {
      width: 100%;
      height: 46px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: default;
      font-family: inherit;
      letter-spacing: -0.1px;
      transition: background 0.35s ease, color 0.35s ease;
      /* Not-ready: same shape, muted colors */
      background: rgba(134, 141, 255, 0.18);
      color: #868DFF;
    }
    /* Ready: exactly Mark as seen */
    .scan-btn.ready {
      background: #868DFF;
      color: #fff;
      cursor: pointer;
    }
    .scan-btn.ready:active { opacity: 0.88; }

    /* Home indicator */
    .home-ind {
      height: 28px; display: flex; align-items: center; justify-content: center;
      background: #f7fafe; flex-shrink: 0;
    }
    .home-bar { width: 120px; height: 4px; border-radius: 2px; background: rgba(42,40,47,0.18); }
  </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="ca" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="36" fill="#e8d5c4"/>
      <ellipse cx="36" cy="42" rx="18" ry="16" fill="#d4b89a"/>
      <circle cx="28" cy="32" r="7" fill="#fff"/>
      <circle cx="44" cy="32" r="7" fill="#fff"/>
      <circle cx="29" cy="33" r="4" fill="#4a3728"/>
      <circle cx="45" cy="33" r="4" fill="#4a3728"/>
      <circle cx="30" cy="32" r="1.5" fill="#fff"/>
      <circle cx="46" cy="32" r="1.5" fill="#fff"/>
      <ellipse cx="36" cy="40" rx="4" ry="3" fill="#c9967a"/>
      <path d="M32 44 Q36 47 40 44" stroke="#8b5e3c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <line x1="20" y1="38" x2="12" y2="36" stroke="#8b5e3c" stroke-width="1"/>
      <line x1="20" y1="40" x2="11" y2="40" stroke="#8b5e3c" stroke-width="1"/>
      <line x1="52" y1="38" x2="60" y2="36" stroke="#8b5e3c" stroke-width="1"/>
      <line x1="52" y1="40" x2="61" y2="40" stroke="#8b5e3c" stroke-width="1"/>
      <polygon points="18,14 24,26 12,26" fill="#e8d5c4"/>
      <polygon points="54,14 60,26 48,26" fill="#e8d5c4"/>
      <polygon points="19,16 23,24 15,24" fill="#f0a0a0"/>
      <polygon points="53,16 57,24 49,24" fill="#f0a0a0"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen">
    <div class="scan-body">

      <!-- Status bar -->
      <div class="status-bar sb-light">
        <span>9:41</span>
        <div class="status-icons">
          <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
          <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
          <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
        </div>
      </div>

      <!-- Nav -->
      <div class="scan-nav">
        <div class="scan-back" onclick="history.back()">
          <svg width="10" height="17" viewBox="0 0 10 17" fill="none">
            <path d="M9 1L1 8.5L9 16" stroke="#2A282F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="scan-title">Add New Pets</span>
      </div>

      <!-- Camera view -->
      <div class="scan-camera-wrap">
        <div class="scan-viewfinder">
          <div class="scan-photo-bg">
            <svg class="scan-cat-svg" viewBox="0 0 72 72">
              <use href="#ca" width="72" height="72"/>
            </svg>
          </div>
          <div class="sc-corner tl"></div>
          <div class="sc-corner tr"></div>
          <div class="sc-corner bl"></div>
          <div class="sc-corner br"></div>
          <div class="scan-line" id="scan-line"></div>
          <div class="scan-tint" id="scan-tint"></div>
        </div>
      </div>

      <!-- Bottom -->
      <div class="scan-bottom">
        <div class="scan-status" id="scan-status">Scanning...</div>
        <div class="scan-prompt" id="scan-prompt">Please hold still.</div>
        <button class="scan-btn" id="scan-btn" onclick="goNext()">
          Ready for the next step
        </button>
      </div>

      <div class="home-ind"><div class="home-bar"></div></div>

    </div>
  </div>
</div>

<script>
  let scanReady = false;

  function goNext() {
    if (scanReady) location.href = 'add-pet.html';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const scanLine = document.getElementById('scan-line');
    const scanStatus = document.getElementById('scan-status');
    const scanPrompt = document.getElementById('scan-prompt');
    const scanBtn = document.getElementById('scan-btn');
    const scanTint = document.getElementById('scan-tint');

    // Start scan
    setTimeout(() => {
      scanLine.style.opacity = '1';
      scanLine.classList.add('running');
    }, 300);

    // Scan complete
    setTimeout(() => {
      scanStatus.textContent = 'Initial identification completed.';
      scanPrompt.textContent = 'Please keep the camera closer..';
      scanTint.classList.add('show');
      scanReady = true;
      scanBtn.classList.add('ready');
    }, 2400);
  });
</script>
</body>
</html>
