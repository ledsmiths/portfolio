<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaPaw — Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SVG symbol definitions -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="nv-cat" viewBox="0 0 100 130">
      <ellipse cx="50" cy="105" rx="26" ry="14"/>
      <rect x="30" y="68" width="40" height="44" rx="12"/>
      <circle cx="50" cy="52" r="22"/>
      <polygon points="30,36 24,14 40,32"/>
      <polygon points="70,36 76,14 60,32"/>
      <path d="M72 85 Q88 74 92 60 Q95 50 85 53" fill="none" stroke="inherit" stroke-width="7" stroke-linecap="round"/>
      <rect x="26" y="108" width="10" height="18" rx="5"/>
      <rect x="40" y="110" width="10" height="18" rx="5"/>
      <rect x="54" y="110" width="10" height="18" rx="5"/>
      <rect x="68" y="108" width="10" height="18" rx="5"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen" style="background:#0d1117;">

    <!-- Status bar -->
    <div class="status-bar sb-dark">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#fff"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.3"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#fff" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.4"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.4"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#fff" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#fff"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#fff" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#fff"/></svg>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="monitor-nav">
      <div class="back-btn" onclick="history.back()">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M9 1L1 8.5L9 16" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span style="font-size:18px;font-weight:600;color:#fff;">Monitor</span>
    </div>

    <!-- Camera feed -->
    <div class="monitor-area">
      <img src="room-bg.jpg.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"/>
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.15);"></div>

      <!-- HUD overlays -->
      <div class="rec-badge"><div class="rec-dot"></div><span class="rec-text">REC</span></div>
      <div class="ts-label">10:32:14 · NV-ON</div>
      <div class="cam-label">CAM-01 · Living Room</div>

      <!-- Zone drawing overlays (zone mode only) -->
      <div id="zones-container" style="position:absolute;inset:0;z-index:25;pointer-events:none;"></div>
      <div id="rubber-band" style="display:none;position:absolute;border:2px dashed rgba(255,255,255,0.85);z-index:31;pointer-events:none;border-radius:3px;"></div>
      <div id="draw-overlay" style="display:none;position:absolute;inset:0;z-index:30;touch-action:none;"></div>
      <div id="draw-hint" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.55);color:#fff;font-size:13px;font-weight:500;padding:8px 16px;border-radius:20px;z-index:32;pointer-events:none;white-space:nowrap;">Drag to draw a zone</div>
    </div>

    <!-- Zone Controls Panel (zone mode only) -->
    <div id="zone-panel" class="zone-panel" style="display:none;">
      <div class="zone-type-row">
        <button id="tab-toilet" class="zone-tab zone-tab-active toilet" onclick="selectTab('toilet')">
          <span style="width:8px;height:8px;border-radius:50%;background:#4EC1EB;flex-shrink:0;"></span>
          Toilet Area
        </button>
        <button id="tab-feeding" class="zone-tab feeding" onclick="selectTab('feeding')">
          <span style="width:8px;height:8px;border-radius:50%;background:#FF9A3C;flex-shrink:0;"></span>
          Feeding Area
        </button>
      </div>
      <button id="draw-btn" class="zone-draw-btn" onclick="startDraw()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9.5 4.5l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Draw Zone
      </button>
      <div id="zone-hint" class="zone-hint-bar"></div>
      <button id="confirm-btn" class="zone-confirm-btn" onclick="confirmZone()" disabled>Confirm</button>
    </div>

  </div>
</div>

<script src="monitor.js"></script>
</body>
</html>
