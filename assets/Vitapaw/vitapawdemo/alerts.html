<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <symbol id="cb" viewBox="0 0 72 72"><circle cx="36" cy="36" r="36" fill="#c8d8e8"/><ellipse cx="36" cy="42" rx="18" ry="16" fill="#aec4d8"/><circle cx="28" cy="32" r="7" fill="#fff"/><circle cx="44" cy="32" r="7" fill="#fff"/><circle cx="29" cy="33" r="4" fill="#2d4a6b"/><circle cx="45" cy="33" r="4" fill="#2d4a6b"/><circle cx="30" cy="32" r="1.5" fill="#fff"/><circle cx="46" cy="32" r="1.5" fill="#fff"/><ellipse cx="36" cy="40" rx="4" ry="3" fill="#e8a0b0"/><path d="M32 44 Q36 47 40 44" stroke="#6b8aaa" stroke-width="1.2" fill="none" stroke-linecap="round"/><line x1="20" y1="38" x2="12" y2="36" stroke="#6b8aaa" stroke-width="1"/><line x1="20" y1="40" x2="11" y2="40" stroke="#6b8aaa" stroke-width="1"/><line x1="52" y1="38" x2="60" y2="36" stroke="#6b8aaa" stroke-width="1"/><line x1="52" y1="40" x2="61" y2="40" stroke="#6b8aaa" stroke-width="1"/><polygon points="18,14 24,26 12,26" fill="#c8d8e8"/><polygon points="54,14 60,26 48,26" fill="#c8d8e8"/><polygon points="19,16 23,24 15,24" fill="#d0b0c8"/><polygon points="53,16 57,24 49,24" fill="#d0b0c8"/></symbol>
    <symbol id="cc" viewBox="0 0 72 72"><circle cx="36" cy="36" r="36" fill="#d4c8b8"/><ellipse cx="36" cy="42" rx="18" ry="16" fill="#bfb0a0"/><circle cx="28" cy="32" r="7" fill="#fff"/><circle cx="44" cy="32" r="7" fill="#fff"/><circle cx="29" cy="33" r="4" fill="#3d2e1e"/><circle cx="45" cy="33" r="4" fill="#3d2e1e"/><circle cx="30" cy="32" r="1.5" fill="#fff"/><circle cx="46" cy="32" r="1.5" fill="#fff"/><ellipse cx="36" cy="40" rx="4" ry="3" fill="#c47060"/><path d="M32 44 Q36 47 40 44" stroke="#7a5a40" stroke-width="1.2" fill="none" stroke-linecap="round"/><line x1="20" y1="38" x2="12" y2="36" stroke="#7a5a40" stroke-width="1"/><line x1="20" y1="40" x2="11" y2="40" stroke="#7a5a40" stroke-width="1"/><line x1="52" y1="38" x2="60" y2="36" stroke="#7a5a40" stroke-width="1"/><line x1="52" y1="40" x2="61" y2="40" stroke="#7a5a40" stroke-width="1"/><polygon points="18,14 24,26 12,26" fill="#d4c8b8"/><polygon points="54,14 60,26 48,26" fill="#d4c8b8"/><polygon points="19,16 23,24 15,24" fill="#e8b090"/><polygon points="53,16 57,24 49,24" fill="#e8b090"/></symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>

<div class="screen-wrap">
  <div class="screen">

    <!-- Status bar -->
    <div class="status-bar sb-light">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="pi-nav">
      <div class="pi-back" onclick="history.back()">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none">
          <path d="M9 1L1 8.5L9 16" stroke="#2A282F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="pi-nav-center" id="al-title">All Alerts</span>
      <div style="width:40px;"></div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-content">
      <div class="scroll-area" style="padding: 16px;">

        <!-- Date filter -->
        <div class="al-filter-bar">
          <div class="al-date-wrap">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="2.5" width="14" height="12.5" rx="2.5" stroke="#5F6C85" stroke-width="1.3"/>
              <path d="M5 1V4M11 1V4" stroke="#5F6C85" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M1 6.5H15" stroke="#5F6C85" stroke-width="1.3"/>
            </svg>
            <input type="date" id="al-date-input" class="al-date-input" placeholder="Select date" onchange="onDateChange(this.value)"/>
          </div>
          <button class="al-clear-btn" id="al-clear-btn" onclick="clearDate()" style="display:none;">Clear</button>
        </div>

        <!-- Result count -->
        <div class="al-result-count" id="al-result-count"></div>

        <!-- Alert list -->
        <div id="al-list" style="display:flex;flex-direction:column;gap:12px;"></div>

        <!-- Empty state -->
        <div class="al-empty" id="al-empty" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="margin-bottom:12px;">
            <circle cx="20" cy="20" r="19" stroke="#DDE2EE" stroke-width="1.5"/>
            <path d="M13 20h14M20 13v14" stroke="#DDE2EE" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div>No alerts found for this date</div>
        </div>

      </div>
    </div>

    <!-- Bottom tab bar -->
    <div class="tab-bar">
      <div class="tab-item" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <svg width="24" height="24"><use href="#icon-bell" width="24" height="24" stroke="#bbb"/></svg>
        <span class="tab-lbl muted">Alarm</span>
      </div>
      <div class="tab-item" onclick="history.back()" style="cursor:pointer;">
        <svg width="24" height="24"><use href="#icon-clipboard" width="24" height="24" stroke="#6e76fe"/></svg>
        <span class="tab-lbl">My Pets</span>
      </div>
      <div class="tab-item">
        <svg width="24" height="24"><use href="#icon-settings" width="24" height="24" stroke="#bbb"/></svg>
        <span class="tab-lbl muted">Settings</span>
      </div>
    </div>

  </div>
</div>

<script src="data.js"></script>
<script src="alerts.js"></script>
</body>
</html>
