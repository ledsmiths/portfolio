<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VitaPaw — Set Username</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>
  </defs>
</svg>

<div class="screen-wrap">
  <div class="screen" style="background:#f2f4f8;">

    <!-- Status bar -->
    <div class="status-bar sb-light" style="background:#f2f4f8;">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="#171717"><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity="0.25"/></svg>
        <svg width="13" height="11" viewBox="0 0 13 11" fill="none" stroke="#171717" stroke-width="1.2"><path d="M6.5 4C8 2.5 10.2 2.5 11.7 4" opacity="0.35"/><path d="M6.5 4C5 2.5 2.8 2.5 1.3 4" opacity="0.35"/><path d="M4.5 6C5.3 5 7.7 5 8.5 6"/><circle cx="6.5" cy="8.5" r="1" fill="#171717" stroke="none"/></svg>
        <svg width="23" height="11" viewBox="0 0 23 11" fill="none"><rect x="0.5" y="0.5" width="19" height="10" rx="3.5" stroke="#171717"/><path d="M20.5 3.5C21.8 3.8 22.5 4.5 22.5 5.5C22.5 6.5 21.8 7.2 20.5 7.5" stroke="#171717" stroke-width="1.1"/><rect x="2" y="2" width="15" height="7" rx="2" fill="#171717"/></svg>
      </div>
    </div>

    <!-- Nav -->
    <div class="ac-nav">
      <div class="ac-back" onclick="history.back()">
        <svg width="24" height="24"><use href="#icon-chevron-left" width="24" height="24" stroke="#2A282F"/></svg>
      </div>
      <span class="ac-title">Edit Username</span>
      <div style="width:32px;"></div>
    </div>

    <div class="scroll-content" style="background:#f2f4f8;overflow-x:hidden;">
      <div style="padding:28px 20px;display:flex;flex-direction:column;gap:24px;box-sizing:border-box;width:100%;">

        <div style="font-size:15px;color:#5F6C85;line-height:1.6;">
          This is the name that will be displayed on your account.
        </div>

        <!-- Input card -->
        <div class="ac-form-card">
          <div class="ac-field">
            <label class="ac-field-label">Username</label>
            <input class="ac-field-input" id="username-input" type="text"
                   placeholder="Enter username" autocomplete="off"
                   oninput="onInput()" maxlength="30"/>
          </div>
        </div>

        <!-- Character count -->
        <div style="text-align:right;font-size:12px;color:#c8cdd8;margin-top:-16px;">
          <span id="char-count">0</span> / 30
        </div>

        <div id="input-error" style="font-size:13px;color:#ff4d4d;margin-top:-16px;min-height:18px;"></div>

        <button class="vi-next-btn" id="save-btn" onclick="saveUsername()" disabled>Save</button>

      </div>
    </div>

  </div>
</div>

<script>
  const stored = sessionStorage.getItem('userUsername') || 'Emily';
  const input  = document.getElementById('username-input');
  input.value  = stored;
  updateCount();

  function onInput() {
    updateCount();
    const val = input.value.trim();
    const err = document.getElementById('input-error');
    const btn = document.getElementById('save-btn');
    if (val.length === 0) {
      err.textContent = 'Username cannot be empty.';
      btn.disabled = true;
    } else if (val === stored) {
      err.textContent = '';
      btn.disabled = true;   // no change, nothing to save
    } else {
      err.textContent = '';
      btn.disabled = false;
    }
  }

  function updateCount() {
    document.getElementById('char-count').textContent = input.value.length;
  }

  function saveUsername() {
    const val = input.value.trim();
    if (!val) return;
    sessionStorage.setItem('userUsername', val);
    history.back();
  }
</script>

</body>
</html>
